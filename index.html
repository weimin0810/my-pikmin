<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>皮克敏收藏地圖 - 貼上照片版</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; }
        #map { height: 100vh; width: 100%; }
        .popup-form { display: flex; flex-direction: column; gap: 10px; min-width: 200px; }
        #paste-area { width: 100%; height: 80px; border: 2px dashed #ccc; text-align: center; line-height: 80px; color: #666; cursor: pointer; }
        #preview { width: 100%; display: none; margin-top: 5px; border-radius: 5px; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        const SUPABASE_URL = 'https://emukablggtnchocpnoiu.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_NtNOyy79dVCQVO4H0qGQbw_-Cbdz3Qc';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const map = L.map('map').setView([25.033, 121.565], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let tempImageData = ""; // 用來存照片

        // 讀取舊的點位
        async function load() {
            const { data } = await _supabase.from('postcards').select('*');
            if (data) {
                data.forEach(p => {
                    L.marker([p.lat, p.lng]).addTo(map)
                     .bindPopup(`<b>${p.title}</b><br><img src="${p.image_url}" style="width:100%">`);
                });
            }
        }
        load();

        // 點擊地圖彈出新增視窗
        map.on('click', function(e) {
            tempImageData = ""; 
            const popupContent = `
                <div class="popup-form">
                    <input type="text" id="p-title" placeholder="地點名稱 (如: 柳營家)">
                    <div id="paste-area">長按此處貼上照片</div>
                    <img id="preview">
                    <button onclick="saveData(${e.latlng.lat}, ${e.latlng.lng})">儲存標記</button>
                </div>
            `;
            L.popup().setLatLng(e.latlng).setContent(popupContent).openOn(map);

            // 監聽貼上動作
            setTimeout(() => {
                const area = document.getElementById('paste-area');
                area.addEventListener('paste', handlePaste);
            }, 500);
        });

        // 處理手機貼上照片
        function handlePaste(event) {
            const items = (event.clipboardData || event.originalEvent.clipboardData).items;
            for (let item of items) {
                if (item.type.indexOf("image") !== -1) {
                    const blob = item.getAsFile();
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        tempImageData = e.target.result;
                        document.getElementById('preview').src = tempImageData;
                        document.getElementById('preview').style.display = 'block';
                        document.getElementById('paste-area').innerText = "照片已就緒！";
                    };
                    reader.readAsDataURL(blob);
                }
            }
        }

        // 存入資料庫
        async function saveData(lat, lng) {
            const title = document.getElementById('p-title').value || "未命名地點";
            if (!tempImageData) return alert("請先貼上照片！");

            const { error } = await _supabase.from('postcards').insert([
                { title: title, lat: lat, lng: lng, image_url: tempImageData }
            ]);

            if (error) alert("儲存失敗: " + error.message);
            else location.reload();
        }
    </script>
</body>
</html>
