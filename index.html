<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>皮克敏收藏地圖 - 穩定簡潔版</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; font-family: -apple-system, "Microsoft JhengHei", sans-serif; }
        #map { height: 100vh; width: 100%; background: #ffffff; }
        .popup-form { display: flex; flex-direction: column; gap: 10px; min-width: 240px; padding: 5px; }
        input[type="text"] { padding: 10px; border: 1px solid #ddd; border-radius: 8px; outline: none; }
        
        /* 貼上照片區 */
        #paste-area { 
            width: 100%; height: 90px; border: 2px dashed #bbb; 
            display: flex; align-items: center; justify-content: center;
            color: #888; cursor: pointer; border-radius: 10px; background: #fafafa;
        }
        #paste-area.active { border-color: #4CAF50; color: #4CAF50; background: #f1f8e9; }
        #preview { width: 100%; display: none; margin-top: 5px; border-radius: 10px; border: 1px solid #eee; }
        
        /* 按鈕風格 */
        .btn-save { background: #1a73e8; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-save:active { background: #174ea6; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        const SUPABASE_URL = 'https://emukablggtnchocpnoiu.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_NtNOyy79dVCQVO4H0qGQbw_-Cbdz3Qc';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // ✅ 換成穩定、免費、極簡的 CartoDB Positron 底圖 (這張最像 Google Maps)
        const map = L.map('map').setView([25.033, 121.565], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        let tempImageData = "";

        async function load() {
            const { data } = await _supabase.from('postcards').select('*');
            if (data) {
                data.forEach(p => {
                    L.marker([p.lat, p.lng]).addTo(map)
                     .bindPopup(`<b>${p.title}</b><br><img src="${p.image_url}" style="width:100%; margin-top:5px; border-radius:5px;">`);
                });
            }
        }
        load();

        map.on('click', function(e) {
            tempImageData = ""; 
            const popupContent = `
                <div class="popup-form">
                    <input type="text" id="p-title" placeholder="這是哪裡？(例：柳營路邊花叢)">
                    <div id="paste-area" onclick="this.focus();" contenteditable="true">長按此處貼上照片</div>
                    <img id="preview">
                    <button class="btn-save" onclick="saveData(${e.latlng.lat}, ${e.latlng.lng})">確認儲存</button>
                </div>
            `;
            L.popup().setLatLng(e.latlng).setContent(popupContent).openOn(map);

            setTimeout(() => {
                const area = document.getElementById('paste-area');
                area.addEventListener('paste', (event) => {
                    const items = (event.clipboardData || event.originalEvent.clipboardData).items;
                    for (let item of items) {
                        if (item.type.indexOf("image") !== -1) {
                            const blob = item.getAsFile();
                            const reader = new FileReader();
                            reader.onload = function(e) {
                                tempImageData = e.target.result;
                                area.innerText = "照片讀取成功！";
                                area.classList.add('active');
                                document.getElementById('preview').src = tempImageData;
                                document.getElementById('preview').style.display = 'block';
                            };
                            reader.readAsDataURL(blob);
                        }
                    }
                });
            }, 500);
        });

        async function saveData(lat, lng) {
            const title = document.getElementById('p-title').value || "未命名地點";
            if (!tempImageData) return alert("請先複製照片再貼上來！");

            const { error } = await _supabase.from('postcards').insert([
                { title, lat, lng, image_url: tempImageData }
            ]);

            if (error) alert("儲存失敗: " + error.message);
            else location.reload();
        }
    </script>
</body>
</html>
